name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Verify cvxpy/scs are not imported by in-repo code
        run: |
          # Boundary set after module name covers every legal Python form:
          #   end-of-line, whitespace ("import cvxpy as cp"), "." (submodule),
          #   "," ("import cvxpy, numpy"), ";" ("import cvxpy; foo()").
          if grep -rE '^[[:space:]]*(import|from)[[:space:]]+(cvxpy|scs)($|[[:space:].,;])' prism_hc/; then
            echo "::error::cvxpy/scs import found in prism_hc/; update CI install or remove the import"
            exit 1
          fi
          echo "ok: prism_hc/ has no cvxpy/scs imports"

      - name: Install runtime deps (slim, no cvxpy/scs)
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'numpy>=1.25' 'torch>=2.0' 'pytest>=8.0'

      - name: Show installed versions
        run: |
          python -c "import sys, platform; print('python', sys.version); print('platform', platform.platform())"
          python -c "import numpy, torch; print('numpy', numpy.__version__); print('torch', torch.__version__)"

      - name: Run unit tests
        run: python -m unittest discover -s . -p "test_*.py" -v

      - name: Smoke demo (prism_hc/demo.py)
        run: python prism_hc/demo.py

      - name: Synthesis wire-up demo (stub fallback path)
        run: python -m prism_hc.synthesis_demo

      - name: Learning demo (real backprop, asserts probe MSE delta)
        run: python -m prism_hc.learning_demo

  pipeline:
    name: REBUS pipeline (py3.11 + cvxpy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install full deps (numpy, cvxpy, scs, torch, pytest)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Show installed versions
        run: python -c "import numpy, cvxpy, scs, torch; print('numpy', numpy.__version__); print('cvxpy', cvxpy.__version__); print('scs', scs.__version__); print('torch', torch.__version__)"

      - name: Synthesis pipeline (asserts [pipeline] provenance, not [stub])
        run: |
          # Pipe to tee so we keep the live log AND a file for grep below.
          # Capture python's exit code via PIPESTATUS: a post-marker assert
          # failure inside synthesis_demo would otherwise be masked by tee's
          # zero exit, letting the grep below pass on stale output.
          python -m prism_hc.synthesis_demo | tee synth.out
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::error::synthesis_demo exited with status $status"
            exit "$status"
          fi
          # Load-bearing assertion: if cvxpy install ever silently breaks, the
          # demo would fall back to StubSupervisorGains and still exit 0.
          # This grep ensures we actually exercised the real solver path.
          grep -q "^\[pipeline\]" synth.out || (echo "::error::synthesis_demo fell back to stub; pipeline path not exercised" && exit 1)
